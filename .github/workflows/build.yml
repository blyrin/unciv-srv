name: 编译构建

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: 编译 ${{ matrix.archive }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - archive: linux-amd64
            goos: linux
            goarch: amd64
          - archive: linux-arm64
            goos: linux
            goarch: arm64
          - archive: windows-amd64
            goos: windows
            goarch: amd64
          - archive: darwin-arm64
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: 编译
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          mkdir -p dist
          BINARY=unciv-srv
          [ "$GOOS" = "windows" ] && BINARY=unciv-srv.exe

          go build -trimpath \
            -ldflags="-s -w -X main.Version=$VERSION -X main.BuildTime=$BUILD_TIME -X main.GitCommit=$GIT_COMMIT" \
            -o dist/$BINARY ./cmd/server

          cd dist
          sha256sum $BINARY > $BINARY.sha256
          ARCHIVE=unciv-srv-${{ matrix.archive }}
          if [ "$GOOS" = "windows" ]; then
            zip $ARCHIVE.zip $BINARY $BINARY.sha256
          else
            tar -czf $ARCHIVE.tar.gz $BINARY $BINARY.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: unciv-srv-${{ matrix.archive }}
          path: dist/unciv-srv-${{ matrix.archive }}.*
          retention-days: 30
          compression-level: 0

  release:
    name: 创建发布版本
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release
          pattern: unciv-srv-*
          merge-multiple: true

      - name: 下载说明
        run: |
          cat > release_notes.md <<'EOF'
          ## 下载说明

          | 系统 | 文件 |
          |------|------|
          | Linux AMD64 | `unciv-srv-linux-amd64.tar.gz` |
          | Linux ARM64 | `unciv-srv-linux-arm64.tar.gz` |
          | Windows AMD64 | `unciv-srv-windows-amd64.zip` |
          | macOS Apple Silicon | `unciv-srv-darwin-arm64.tar.gz` |

          每个压缩包内含 SHA256 校验文件。
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_notes.md
